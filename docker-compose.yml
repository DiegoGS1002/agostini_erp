services:
        mysql:
            image: mysql:8.0
            container_name: agostini_mysql
            restart: unless-stopped
            environment:
                MYSQL_ROOT_PASSWORD: root
                MYSQL_DATABASE: roubo
                MYSQL_USER: user
                MYSQL_PASSWORD: password
            volumes:
                - mysql_data:/var/lib/mysql
            networks:
                - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-mariadb:
        driver: local
